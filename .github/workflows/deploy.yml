name: Full CI/CD Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # 1. Checkout code
      # -------------------------
      - name: Checkout
        uses: actions/checkout@v3

      # -------------------------
      # 2. Setup Node
      # -------------------------
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # -------------------------
      # 3. Build Frontend (UPDATED ✅)
      # -------------------------
      - name: Build Frontend
        run: |
          cd frontend
          npm install

          echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" > .env
          echo "VITE_SOCKET_URL=${{ secrets.VITE_SOCKET_URL }}" >> .env

          npm run build

      # -------------------------
      # 4. Deploy to S3
      # -------------------------
      - name: Upload to S3
        run: |
          aws s3 sync frontend/dist s3://${{ secrets.S3_BUCKET_NAME }} --delete
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}

      # -------------------------
      # 5. Invalidate CloudFront
      # -------------------------
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}

      # -------------------------
      # 6. Deploy Backend (EC2)
      # -------------------------
      - name: Deploy Backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            set -e

            cd ~/TeamSketch
            git pull origin main

            cd backend
            npm install

            pm2 restart app || pm2 start src/app.js --name app -- 5000
            pm2 restart whiteboardServer || pm2 start src/whiteboardServer.js --name whiteboardServer -- 4000

            pm2 save

            sudo nginx -t && sudo systemctl reload nginx